<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha de Acesso</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; margin: 0; padding: 0; background-color: #fff; }
        .container { max-width: 600px; margin: 0 auto; padding: 30px; background-color: #e6e6e6; border-radius: 8px; text-align: center; }
        h2 { font-size: 24px; margin-bottom: 30px; }
        p { font-size: 16px; margin-bottom: 20px; }
        .password-box { background-color: #FFF; padding: 20px; margin: 30px auto; font-size: 24px; font-weight: bold; letter-spacing: 4px; border-radius: 12px; max-width: 280px; }
        .ignore-text { font-size: 14px; color: #777; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sua senha de acesso</h2>
        <p>Você foi adicionado como membro da família. Use a senha abaixo para entrar no aplicativo.</p>
        <div class="password-box">{{ temp_password }}</div>
        <p>Recomendamos alterar esta senha após o primeiro acesso.</p>
        <p class="ignore-text">Se você não esperava este e-mail, entre em contato com o administrador da família.</p>
    </div>
</body>
</html>
